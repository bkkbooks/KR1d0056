  text: 欽定四庫全書經部四
  hash: sha256:753fed3570de885feea2655f2afda2dcac3de78d0edd6607684749ed59d8b745
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0056_WYG_000-1a, image: WYG0116/WYG0116-0537a.png}
body:
  text: 月令解禮類三禮記之屬提要臣等謹案月令解十二卷宋張虙撰虙慈溪人慶元丙辰進士官至國子祭酒是編乃虙端平初入侍讀幄時以纂未及竟以病歸家居時乃續完之表進於朝十二月各自為卷奏稱每一月改則令以此一月進于御前可以裁成天地之道輔相天地之宜雖未免過膠古義不盡可見施行然辭義曉暢於順時出政之際皆三致意焉其用心有足取者月令于劉向别録屬明堂陰陽記當即漢書藝文志所云古明堂之遺事在明堂陰陽三十篇之内者吕氏春秋録以分冠十二紀馬融賈逵蔡邕王肅孔晁張華皆以為周公作鄭康成髙誘以為即不韋作論者據漢百官表言太尉為秦官或又據國語晉有元尉輿尉之文謂尉之名不必起於秦然究不得因元尉輿尉遂斷三代必有太尉也意不韋採記舊文或傳益以秦制歟今考其書古帝王法政施令之大端皆彰彰具存得其意而變通之未嘗非通經適用之一助至其言誤某令則致某災殆因洪範庶徴而推衍之遂為漢儒陰陽五行之濫觴虙解皆未能駁正然列在禮經相沿已乆亦不能獨為虙咎也原書因隨月進御故凡解見孟月者仲月季月皆重見永樂大典所載合為一編多刪其複于例為協間有刪之不盡者今併汰除以歸畫一焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀進月令解表臣虙言臣竊以後天而奉天時雖夙參於造化按月以觀月令實肇見於聖明矧臨萬務之繁欲極羣書之博惟拔尋於要領庶頥愛於精神臣惶懼惶懼頓首頓首考吕氏春秋之書承周末聖賢之論紀分十二井然彚列之條歲盡一周粲若環循之次雜之於禮附以爲經漢相奏之固嘗表采唐宗定此亦就刋刪雖號鉤深於斯文未知區别於令序曷若以孟仲季析為寒暑之期於朔望弦占作旦昬之候所謂舉目皆可見若欲銳情又何加凡饜飫使自得之非睿知孰能與此兹葢恭遇皇帝陛下心存兢業學務雍熈藝圃覽游澹若耆書之樂經幃訪問淵乎耆古之懷方當省歲以有為因聽負暄之入獻取諸儒共集之典釐每卷各立之門㑹析木㑹元枵隨所舍而改中夾鍾中太蔟視其律以更據往知今自我作古嚴恭寅畏外此何求輔相裁成由兹而出執而論厯殊史家黑白之分寫以為圖笑巧匠丹青之象其月令解十二卷繕寫成十二冊謹隨表上進以聞臣惶懼惶懼頓首頓首謹言奏月令解劄子臣昨者叨侍經筵適講月令秋之三月嘗與侍讀鍾震言欲待月令終篇以十二月分爲十二卷書之納於禁中時當此月陛下則以此月一卷觀覽凡一月之中隂陽消長之運星夜出入之躔氣序之遷改景物之多易與夫園林草木之華盛鳥獸蟲魚之生育田舍耕耘之節婦子蠶桑之期歴歴具載使置之座側又切於崔寔之政論置之几案何減乎魏徵之諫䟽其於贊化為益多矣既而以病予告有志不成縁臣身則病矣而眼猶能觀故書心猶能記舊事於是以秋三月已成之說上接乎春夏下逮夫季冬一一為之解釋通前爲十二卷陛下或許以投進即當㳙日備録装褫送上每一月改則令以此一月進於御前陛下展卷時時玩之或謂智本天賜聰本天生一覽無遺成誦在心何假纂集之爲不知此非爲記問設也惟欲於宫中無事清閒之燕舉目在前而已昔有談脩養之術者欲書月令置左右如冬夏至宜謹嗜欲之類庶得自警謂陛下守此則可以裁成天地之道可以輔相天地之宜豈為脩養之術哉臣不勝惓惓

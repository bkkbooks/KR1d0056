body:
  text: 月令解卷五宋張虙撰仲夏之月仲夏者斗建午之辰漢志云咢布于午則午咢也夏正爲五月日在東井五月之中三統歴云日在井三十一度元嘉歴云日在東井十八度日與斗建常相合午與未合故五月斗建午則日在未井星屬未也井八星昬亢中旦危中亢四星東方之㝛危三星北方之㝛時日長夜短昬旦不相望也其日丙丁其帝炎帝其神祝融其蟲羽其音徵律中蕤賓其數七其味苦其臭焦其祀竈祭先肺蕤賓者月建午之律也仲夏氣至則蕤賓之律應周語云蕤賓所以安靖神人獻酬交酢漢志云蕤繼也賓導也言陽始導陰氣使繼養物也小暑至螳蜋生鶪始鳴反舌無聲小暑爲六月節今月建午而言小暑至者詩言七月流火火流則暑退暑退於孟秋則極盛於季夏當五月小暑爲六月節者此見暑至之漸也螳蜋方言云譚魯以南謂之蟷蠰三河之域謂之螳蜋燕趙之際謂之食厖齊杞以東謂之馬穀天子居明堂大廟乘朱路駕赤駵載赤旂衣未衣服赤玉食菽與雞其器髙以粗此當午上五月位也養壯佼是月也命樂師脩鞀鞞鼓均琴瑟管簫執干戚戈羽調竽笙竾簧飭鐘磬柷敔命有司爲民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益于民者以祈穀實先命有司祈祀者於是始講雩禮曰大雩則雩帝也用盛禮則祀之也不特天子舉是禮於上又以命百縣百辟卿士有益于民如句龍后稷等月令言縣即天子之縣内諸侯也夫雩將以求雨也今乃以祈穀實葢祈雨正爲榖也以祈穀實猶爲麥祈實無非爲民也農乃登黍是月也天子乃以雛嘗黍羞以含桃先薦寢廟月令書登麥登稻之後天子必以牲嘗之而薦寢廟惟此月書登黍則獨以異文登者謂農以新獻於上非正熟時說文謂黍以暑得名今小暑至農遂登黍方慤謂非秬黍特其種類之早者雛鳥之始生以始生之鳥嘗新登之黍亦相宜也至於薦之寢廟又不直致而羞以含桃焉含桃注謂櫻桃漢叔孫通語惠帝取櫻桃獻宗廟諸果獻由此興通不過謂時新之物當先薦宗廟耳未必識月令所書之意觀家語載魯哀公賜孔子桃與黍孔子以桃雪黍古人以桃雪黍自有深意案家語乃云孔子先食黍而後食桃公曰黍者所以雪桃非爲食之也其事於含桃絶不相涉孔子獨知月令于薦黍之時加以含桃方慤云含桃實雖小而類桃故亦謂之桃不然月令薦新非一事何獨此加以含桃邪案解内亦以月令爲呂不韋書不得云孔子獨知月令矣其下所云殊無意義應有脫誤令民毋艾藍以染毋燒灰毋暴布藍以染青故青出於藍夏染之爲最美也聖人恐其取之多非所以助物長故戒之周禮染人注凡染當及盛暑熱潤則是月用藍以染正得其宜既戒人無艾藍矣又令毋燒灰暴布此二事亦爲染發也考工記㡛氏湅帛以欄爲灰言以欄木之灰漸釋其帛則灰爲染之用矣布爲人之服去地尺曰暴案尺字原書作天今改正據考工記云去地尺暴之非去地尺曰暴也語亦舛誤晝暴諸日則布亦必暴矣燒灰暴布則耗傷陽氣不欲張而用之也門閭毋閉關市毋索挺重囚益其食門閭毋閉欲陽氣之宣也周禮設司關司市之職非欲罔民之利也上之人不窮民隱則貨賄倍出矣重囚與輕繫不同輕繫可出重囚則寛益其食恐以瘐死傷助長氣也游牝别羣則執騰駒案陸德明經典釋文云執如字蔡本作縶班馬政季春游牝於牧至是則别羣春合累牛騰馬至是則執騰駒皆防物之性恐其傷生也馬政莫重於周禮大司馬掌邦政夫掌天下之政而以司馬名則其重可知至於趣馬巫馬之簡治校人廋人之乘阜圉師牧師之牧養無非政也班即頒也左傳有班馬之聲與此班之義不同是月也日長至陰陽爭死生分君子齊戒處必掩身毋躁止聲色毋或進薄滋味毋致和節耆欲定心氣百官靜事毋刑以定晏隂之所成此章與仲冬對文夏日長至冬日短至至之言極也陰陽爭者夏則陰方來而與陽遇冬則陽方來而與陰遇未各止其所故爭也天地造化陰陽消長著于易者何嘗有爭此亦以人所料度言之耳夏言死生分冬曰諸生蕩惟言生而不言死葢自生而死如草木昆蟲之類有生于春夏而死于秋冬者顯然可見故言死生分自死而生則起于萌孽之微初無可見之跡故言諸生蕩然此則論時令而然若君子所以治身則冬夏若異而實同葢人之一身嘗欲至誠滌慮退藏於密此道固無分於冬夏夏則戒以毋躁與冬之欲寧異者暑為躁寒爲寧聲色人所欲止之毋使之進滋味人所欲薄之毋使致和耆欲則節之心氣則欲定凡爾百官雖曰趨事又貴靜事毋刑則不尚殺戮凡此以微陰方生而未定故定之者君子也君子定其所成鹿角解蟬始鳴半夏生木菫榮又記時候也重紀時候者先紀時候以明應節後言時候以應分至所應不同故重紀之也麋鹿之生皆能解角猶蛟龍之蛻骨也而其時則不同鹿山獸所謂鹿走山林是也麋澤獸所謂澤中之麋是也山髙而澤卑鹿受髙燥之氣多必資陰氣麋受卑濕之氣多必資陽氣所以鹿感陰而解角麋感陽而解角解言生新而解舊也蟬以仲夏鳴若寒蟬則以孟秋鳴蟬與寒蟬異種也半夏生仲夏居夏之半而是藥生於此時故因以為名木菫朝榮而暮隕是月也毋用火南方可以居髙明可以逺眺望可以升山陵可以處臺榭此四語當反觀之其曰可以者則惟仲夏為宜也葢髙明可居也或以生疾所以仲夏爲宜眺望可逺也或困目力所以仲夏爲宜山陵可升也或有嵐瘴所以仲夏爲宜臺榭可處也或有髙寒所以仲夏爲宜仲夏行冬令則雹凍傷穀道路不通暴兵來至行春令則五穀晚孰百螣時起其國乃饑行秋令則草木零落果實蚤成民殃於疫行冬令則仲夏之時似冬冬有雹凍今其時似冬則有傷穀之害道路不通夏而寒故也行春令則仲夏之時似春夏去春未逺一氣之差則穀遂晚熟螣蝗之屬言百者明衆類並爲害蝗起傷穀宜其饑也行秋令則仲夏之時似秋此是寒早也草木于夏而零落果實于夏而早成氣序不調民宜疫也

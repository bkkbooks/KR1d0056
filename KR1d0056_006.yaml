body:
  text: 月令解卷六宋張虙撰季夏之月季夏者斗建未之辰也漢志云昧薆于未則未昧也夏正為六月日在柳六月之中三統歷云日在張三度元嘉歷云日在柳十二度日與斗建常相合未與午合故六月斗建未則日在午柳星屬午也柳八星昏火中旦奎中火心星也火三星東方之宿奎十六星西方之宿火與奎正相望也其日丙丁其帝炎帝其神祝融其蟲羽其音徴律中林鍾其數七其味苦其臭焦其祀竈祭先肺林鍾者月建未之律也季夏氣至則林鍾之律應周語云林鍾和展百事俾莫不任肅純恪漢志云林君也言陰氣受任助蕤賓君主種物使長大楙盛也溫風始至蟋蟀居壁鷹乃學習腐草為螢皆記時候也孟春言東風孟秋言凉風此風應時也而夏之溫風乃言於夏末者蓋溫風至則陽氣極也蟋蟀以羽翼未成而居壁鷹學習學搏擊也腐草為螢木之腐也蟲生草之腐也為飛螢天子居明堂右個乘朱路駕赤駵載赤旗衣朱衣服赤玉食菽與雞其器高以粗此當未上六月位也命漁師伐蛟取鼉登龜取黿四者甲類秋乃堅成皆水族也故以命漁師必於季夏者欲以盛暑之氣燥其皮甲利其耐久故也命澤人納材葦葦荻之小者生於大澤故令澤人納之欲其柔韌可用故納于季夏之時織以為薄必擇其材者是月也命四監大合百縣之秩芻以養犧牲令民無不咸出其力以共皇天上帝名山大川四方之神以祠宗廟社稷之靈以為民祈福是月也命婦官染采黼黻文章必以法故無或差貸黑黃倉赤莫不質良毋敢詐僞以給郊廟祭祀之服以為旗章以别貴賤等給之度周禮婦官有典婦功典枲染人等此既染采則獨指染人也黼黻文章則見於冕服者其事為重不可以無法不可以無故法者古人所創故者古人所用一或差貸則為不衷之服黑黃倉赤泛言五采又非冕服比矣必欲其質必欲其良質取其實良取其善一有詐僞則邪慝之物也郊廟祭祀之服蓋總言之且不特用之於服也以為旗章則貴賤以分等給有度皆從此以定婦官之職可不謹哉是月也樹木方盛乃命虞人入山行木毋有斬伐不可以興土功不可以合諸侯不可以起兵動衆毋舉大事以搖養氣毋發令而待以妨神農之事也水潦盛昌神農將持功舉大事則有天殃木生於春長於夏至夏末垂則盛矣虞蓋山虞也行木循而行之也毋有斬伐慮傷方盛之材也興土功合諸侯起兵動衆此皆大事也不可興而興不可合而合不可起不可動而起之動之皆所以搖養氣也養氣萬物作于春而氣主生長于夏而氣主養故謂之養氣土將用事氣欲靜也不可搖之發令謂將有征役也發之過早而使民蹻足而待其不妨民事乎神農之事即指民事也土神稱神農若先嗇之類此季夏也而言土知土用事也水潦盛昌土至此潤溽而易雨持功猶言用事也水潦盛昌神農將用事而人乃舉大事以妨之違盛逆天而天災適當之矣是月也土潤溽暑大雨時行燒剃行水利以殺草如以熱湯可以糞田疇可以美土疆注潤溽謂塗溼也潤溽乃雨之證故大雨時行曰時行則非常有所謂涷雨者田家因之或燒或剃謂治草也所以行水是水既行則草無不死如彼熱湯復以所除之草糞其田疇美其土疆疆即周禮疆㯺也季夏行春令則榖實鮮落國多風咳民乃遷徙行秋令則丘隰水潦禾稼不孰乃多女災行冬令則風寒不時鷹隼蚤鷙四鄙入保行春令則季夏之時似春當春之時萬物初榮至夏季榖垂成矣今行春令氣不足以成之所以鮮落非衰而落也風咳肺受春風而咳民之遷徙亦以春主發散人情亦然行秋令則季夏之時似秋水潦以金生水故也稼不孰以水為害也行冬令則季夏之時似冬因風而寒故曰風寒冬時如此鷹隼未陰而先擊注謂得疾厲之氣孟夏行秋令季夏行冬令皆四鄙入保皆有所畏而然中央土四時五行固是天地所生而四時是氣五行是物氣輕虛所以麗天物質凝所以屬地四時係天年有三百六十日則春夏秋冬各分居九十日五行以配四時布于三百六十日間以木配春以火配夏以金配秋以水配冬以土則每時寄王十八日也故九十日之間戊巳之日各有九也雖每分寄而位本未宜處於季夏之末火金之間故在此陳之也周人兆黃帝於南郊迎土氣於季夏亦以是爾歷於立秋以前言土王用事即其時也橫渠張載云以易言之八卦之位坤在西南致養之地當離兊之間離為夏為火兊為秋為金則坤為土在中央宜也又木生火火生土土生金金生水則土自當在火金之間也其日戊巳戊己屬中央注戊之言茂也己之言起也萬物皆枝葉茂盛其含秀者抑屈而起因以為日名其帝黃帝其神后土據經惟曰其帝其神初不言祀正魏相傳言中央之神黃帝乘坤艮執繩司下土也黃者中之色也五行獨土神稱后者后君也位居中統領四行故稱君也其蟲倮倮亦謂之蟲注象物露見不隱藏虎豹之屬恆淺毛其音宮疏謂宮中也居中央暢四方唱始施生為四聲綱也律中黃鍾之宮春夏秋冬各有律以候氣季夏十八日土之氣至則黃鍾之律應黃鍾全律其應在十一月若季夏土氣至則黃鍾之宮聲應耳黃鍾五聲與其最尊一聲應中者氣與律聲相當也疏謂土寄王四季無候氣之管取黃鍾宮聲以應土耳非也管即律也無管何以言律中耶其數五五者土之正數其味甘其臭香甘者味之本也香者臭之本也其祀中霤祭先心中霤一室之主居中而奠四隅郊特牲云家主中霤而國主社故中央祀中霤祭用牲之藏當以人六脈之次第求之自右手起以命脈為主於是為脾為肺乃入左手為心故中央先心也天子居大廟大室乘大路駕黃駵載黃旗衣黃衣服黃玉食稷與牛其器圜以閎大廟位左右個之中大室又為大廟之中故中央土居之疏云周之明堂以夏世室推之大室在中央大于四角之室觀疏意則大室在夏明堂之內案四正之堂稱大廟以其共一大室故曰大廟大室明大室居四正之堂中央耳疏內未嘗專主夏明堂言此語非也大路獨尊於四路不以色稱也殷路之制而飾之以黃所駕者黃駵所載者黃旗所衣者黃衣黃衣為後世人主常服稷土榖五榖之長牛土畜形最大位居中央食當方之榖畜亦異於他時也器圜者象土周匝於四時閎者取其髙廣案殷路之制以下七十有八字原本誤在仲秋之末今移於此

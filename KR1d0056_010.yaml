body:
  text: 月令解卷十宋張虙撰孟冬之月孟冬者斗建亥之辰也漢志云該閡於亥則亥該也夏正為十月日在尾十月之中三統歷云日在箕七度元嘉歷云日在尾十二度日與斗建常相合亥與寅合故十月斗建亥則日在尾尾屬寅也尾九星昏危中旦七星中危三星北方之宿七星南方之宿危與七星相望其日壬癸壬癸屬冬注壬之言任也癸之言揆也時萬物懷任於下揆然萌芽因以為曰名其帝顓頊其神元冥據經惟言其帝其神初不言祀正前漢魏相傳言北方之神顓帝乘坎執權司冬者顓之為言専也隂盛則靜而専頊之為言正也冬氣升而其位正故帝曰顓頊春為蒼天知冬為元南為明方知冬為冥故神曰元冥其蟲介介亦謂之蟲所謂介蟲三百六十龜為之長注介甲也象物閉藏地中龜鱉之屬其音羽疏謂冬時調和樂以羽為主羽聚也聚藏宇覆之也律中應鍾應鍾者月建亥之律也孟冬氣至則應鍾之律應周語云應鍾均利器用俾應復漢志云言隂氣應無射該藏萬物而雜陽閡種也其數六水數一得土五數故為成數六其味鹹其臭朽水潤下作鹹凡鹹朽者皆屬焉氣若有若無為朽其祀行祭先腎冬與夏為對人之生不在家則在路夏祀竈賴其養於家冬祀行資其庇於路然行祀於冬者冬嵗之終役車其休故冬祀行也祭用牲之藏時各有所先惟冬先腎為本屬若春夏秋與中央皆非本屬當以人六脈之次第求之自右手起以命脈為主於是為脾為肺乃入左手為心為肝為腎故冬先腎也水始冰地始凍雉入大水為蜃虹藏不見此紀十月時候也水流物也至是成冰隂氣凝沍也地堅物也至是合凍亦隂氣凝沍也造物之妙或變或化難以理詰雉入大水為蜃既非可以形求又非可以色求所可得而言者當春發生則鷹化為鳩鼠化為鴽其化者亦不自知此春時也當秋冬之時爵之為蛤雉之為蜃非化也入大水為之此由得水而然也虹天地之淫氣見於春乘陽也藏於冬伏隂也天地之間無非氣也其曰溫厚嚴凝之氣此正也或為愆或為厲或為淫皆非正也天子居𤣥堂左個乘𤣥路駕鐵驪載𤣥旗衣黑衣服𤣥玉冬為元英所以吕氏取之以名天子所居此當亥上十月位也元路路之色元也在天之色則為元在人之色則為黑鐵驪鐵則元色之重者馬純黑曰驪夏后氏尚黑戎事乘驪元旗旗之色尚元也載謂建之於車周禮交龍為旗旗必有鈴黑衣所衣之衣尚黑色也古六服有元衣元玉玉之黑也服謂冕旒及笄并佩玉尚元色也相玉經云黑侔純漆食黍與彘其器閎以奄黍火榖彘水畜寒氣不可過故食火榖以減之寒氣不可抑故食當方之牲以存之是月也以立冬先立冬三日大史謁之天子曰某日立冬盛德在水天子乃齊立冬之日天子親帥三公九卿大夫以迎冬於北郊立冬為十月節迎冬於北郊者人君後天而奉天時當其氣至則出郊以迎所以導之也冬之盛德在水水屬冬也凡見於萬物之藏水之德也親帥羣臣迎之於北郊所以重其至示敬也迎迎其氣耳非有神也或謂即顓帝元冥故迎而祭之注引文曜鉤謂叶光紀還反賞死事恤孤寡迎冬還反所行之賞與三時異蓋因殺氣之盛而念死事之人慮其孤寡不得所養從而賞之順時之政於是為至漢羽林孤兒者取從軍死事之子孫養羽林官教以五兵他時發以為軍養之將以用之非古意是月也命大史釁龜策占兆審卦吉凶是察阿黨則罪無有掩蔽言釁龜策則不特龜釁策亦釁矣古者物成則釁此當物辨之初而釁焉示新也龜為卜策為筮龜以卜而有兆策以筮而有卦兆有象故言占卦有數故言審占兆審卦則吉凶見矣吉凶總承上辭也夫大史日官也以龜策之事命之可見矣而阿黨之察亦係焉何也意者古之史官實持褒貶之權人臣有罪皆得而大書之如董狐之書趙盾南史之書崔杼則阿黨之罪雖欲隱蔽得乎此古之史官非星翁歷士之比也是月也天子始裘隕霜而冬裘具故司裘以仲秋獻良裘以季秋獻功裘至是而天子始服矣天子所服衣以順時為重也命有司曰天氣上騰地氣下降天地不通閉塞而成冬天地交泰故春言和同天地不交否故冬言閉塞和同之時天下皆知春之為春不必告詔也閉塞之時天下雖知之而或有不謹者所以命有司也人苟知閉塞之義則事事物物皆不敢肆矣命百官謹蓋藏命司徒循行積聚無有不斂蓋藏之當謹凡爾百官莫不皆然仲秋嘗以積聚趣民矣至是司徒循行之無有不斂猶恐有遺利也壞城郭戒門閭修鍵閉慎管籥固封疆備邉竟完要塞謹關梁塞蹊徑飭喪紀辨衣裳審棺椁之薄厚塋丘壟之大小髙卑厚薄之度貴賤之等級三里之城七里之郭有國之常制壞之欲其厚固也有城郭則有門閭故從而戒之有門閭則有鍵閉又從而修之有鍵閉則必有管籥又從而謹之外而為封疆欲其固又外而為邉境欲其備下至於要害之當完關梁之宜謹蹊徑之當塞無不致意此九者皆已略舉於秋至此總而命之則四海九州之廣無有闕漏之處至於喪紀之事此亦閉藏之具故順時飭正之其衣裳棺椁邱壟又因而辨之耳或謂喪紀人之終事以嵗之終飭人之終事又謂天地升降辨衣裳之時雖死猶謹曽子易簀似之此皆失之鑿也是月也命工師效功陳祭器按度程毋或作為淫巧以蕩上心必功致為上物勒工名以考其誠功有不當必行其罪以窮其情霜降而百工休休則無作矣故可以效功也君子不敢以私䙝同其所尊敬故陳祭器而不及燕器凡器有度有程皆從而案之毋或作為淫巧以蕩上心栁宗元深病之以為舍此時則可以為之乎是不然當季春命工師審量之日因其作以此戒之孟冬命工師效功之日因其成又以此戒之功致者功之至者也功不至則器易壞矣誠則盡心於所造不敢滅裂者情則有不盡之處而功不至者物勒其名久之常存則誠可考矣功或不當必治其罪則情可窮矣古之人雖一器物其不苟也如此是月也大飲蒸天子乃祈來年于天宗大割祠于公社及門閭臘先祖五祀勞農以休息之天子乃命將帥講武習射御角力此皆當十月農工之畢故舉勞農之事而其事不一也蒸宗廟之冬祭也月令有嘗犧牲之言有大飲蒸之言蒸嘗乃宗廟秋冬祭名嘗犧牲是以嘗祭之犧牲告備也飲蒸蒸不可以為升蓋蒸祭畢而飲故曰飲蒸言飲此蒸也大則非常飲蒸祭最盛飲酒亦盛也天宗日為陽宗月為隂宗北辰為星宗祈年則詩所謂以興嗣嵗也祈年之禮大而簡故不以牲言公社及門閭則大割以祠之大割大殺羣牲也先祖五祀則曰臘臘謂以獵得之肉祭之此等之祭總謂之蠟若别而言之天宗公社門閭謂之蠟其祭則皮辨素服葛帶榛杖其臘先祖五祀謂之息民之祭其服則黃衣黃冠要之皆是勞農以休息之也古者君民一體其借民之力固欲其趨時無怠其愛民之力又欲其順時少休雖然聖人之治天下不使民一日有怠心故曰為政日新夫以息老勞農之日宜可以少休矣而講肄武事不容少弛射御維精必使習而熟之力有小大使相角而自見故民心但覺其有事而無弛慢者是月也乃命水虞漁師收水泉池澤之賦毋或敢侵削衆庶兆民以為天子取怨于下其有若此者行罪無赦魚至冬而美故取魚以冬取魚則有賦故水泉池澤之賦命二官收之亦其職也先王之時川有衡澤有虞為之厲禁非為賦設也後世澤之葦蒲舟鮫守之海之鹽蜃祈望守之守之嚴則征之嚴民始失利矣今月令戒其侵削或取怨于下若此者行罪無赦蓋亦恐有司苛取以病民乎孟冬行春令則凍閉不密地氣上泄民多流亡行夏令則國多暴風方冬不寒蟄蟲復出行秋令則雪霜不時小兵時起土地侵削行春令則孟冬之時似春凍閉不密地氣上泄也民之流亡亦以發散故也行夏令則孟冬之時似夏夏風多暴陽氣所作風而不寒蟄者亦不得其藏也行秋令則孟冬之時似秋秋令則寒氣遲故雪霜皆不時降小兵非大軍旅時起金氣勝也土地侵削揫斂所致也

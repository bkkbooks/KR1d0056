body:
  text: 月令解卷八宋張虙撰仲秋之月仲秋者斗建酉之辰也漢志云留孰於酉則酉留也夏正為八月日在角八月之中三統歴云日在角十度元嘉歴云日在軫十五度日與斗建常相合酉與辰合故八月斗建酉則日在辰角屬辰也角二星昬牽牛中旦觜觿中牽牛六星北方之初宿觜觿三星西方之末㝛牛與觜亦相望也其日庚辛其帝少皥其神蓐収其蟲毛其音商律中南吕其數九其味辛其臭腥其祀門祭先肝南吕者斗建酉之律也仲秋氣至則南吕之律應周語云南吕者贊陽秀物案國語無物字此張氏增成其義漢志云南任也言隂氣旅助夷則任成萬物也盲風至鴻鴈來元鳥歸羣鳥養羞此記八月時候也疾風來至秋寖深矣月令以草木蟲鳥紀時候惟鴈則三時有之春也秋也冬也以鴈之知時尤爲可驗孟春言鴻鴈來仲秋言鴻鴈來鴈之隨陽初無常所南北皆其居也孟春之來自南來也仲秋之來自北來也元鳥燕也與鴈不同春至而秋歸歸其所也羣鳥養羞羞謂所食也養而蓄之以備冬藏以是知先時而備物猶能之人靈於物可不知有先具邪天子居總章大廟乗戎路駕白駱載白旂衣白衣服白玉食麻與犬其器廉以深此當酉上八月位也是月也養衰老授几杖行糜粥飲食養老之禮古之盛禮也若指衰老之人則其禮不同矣然授以几杖與致仕之人相似待之亦不薄至於行糜粥飲食毋乃視如饑餓者乎葢飲食所以養其氣而為之糜粥焉惟恐有以傷之此其憫老之篤殆與祝哽祝噎之意類未可輕視也乃命司服具飭衣裳文繡有恒制有小大度有短長案今本訛作長短據宋本改正衣服有量必循其故冠帶有常人知九月授衣故先期有司服之命不知古人深意自有在也夫衣服為身之章亦為身之檢也筋骸之束肌膚之㑹所以収斂者衣服也當揫斂之時具飭衣裳豈徒然哉正以合揫斂之義衣裳則盛服也衣服則泛指也上衣下裳此盛服也文繡以為美宜常而不宜異制之小大度之短長一毫不容差也若衣服則泛指矣量猶數也過數則侈非其故矣人情莫不喜新而厭故不循其故則有竒衺不衷之患冠帶尤身之所重者亦有常而不變故曰衣服不貳從容有常此詩人所以思故也乃命有司申嚴百刑斬殺必當毋或枉橈枉橈不當反受其殃古人之於刑謹之重之孟秋既命嚴斷刑矣至此又從而申嚴之刑章有五而曰百刑舉罪以言也傷膚毁髮古人尚不忍若斷者不可復續死者不可復生則斬殺之辟可枉橈而不當乎此章不特戒之而已直以反受其殃警之非設為之辭也觀吕刑一篇反覆用刑之道直謂苗民殺戮無辜上帝降咎乃絶厥世則反受其殃信不誣也夫人臣任用刑之責以枉橈而被殃固其所自取有不足念者惟國家以若人而掌刑一夫茹苦三年大旱一婦銜寃六月隕霜怨恨所鐘乖氣成象至於促國之脈銷國之福殃在若人之身而毒流四海之大則掌刑之責其可輕付可不畏哉可不謹哉是月也乃命宰祝循行犧牲視全具案芻豢瞻肥瘠察物色必比類量小大案今本訛作大小據宋本改正視長短皆中度五者備當上帝其饗季夏養犧牲盖授充人而芻人至此命宰祝又循行之以物至此形成而不變也視其全具知所以養之者皆可用案其芻豢知所以食之者皆已至然後求之五者五者之分當依疏説盖欲求之於牲也瞻肥瘠瞻肥腯與否也察物色察騂黝之别也必比類已行故事曰比品物相隨曰類五方異其色是比也大皥配東亦用青其類也量小大大謂牛羊豕成牲者小謂羔豚之屬視長短者天地之牛角繭栗宗廟之牛角握之屬也惟一一皆中度斯謂備當一有不合非備當也古者聖王奉其祭祀敬之至則無一事不敬故不憚其委曲誠之極則無一物不誠故不嫌其反覆施之於神神其有不饗乎後世視肹蠁為茫昩付幽深於不可測鹵莽之患生而怠慢之念起宜乎神之不格也天子乃難以逹秋氣聖人有以順隂陽之氣深慮天邪之得以干正天地之間有不正之氣注隂慝不當言隂謂之邪慝可也案鄭注無陰慝二字即他處解釋難者亦無之不知何以云然難之法固所以逐不正也季春之難所以畢春氣春氣發生有不正者干之則發生之功不遂於是乎難曰畢者令春氣得以成功也故在季春仲秋之難所以逹秋氣時當仲秋正萬寳告成之時有不正者干之則氣必抑塞於是乎難曰逹者令秋氣得以行也故在仲秋夏則不難當夏之時陽氣極盛邪氣自銷不待乎難至冬則又大難矣難則磔牲唯秋則不磔盖逹秋氣則有輔相裁成之意惟天子能之亦不假有所磔也以犬嘗麻先薦寢廟以犬嘗麻以金勝木也月令凡言嘗取義亦不同或勝之或生之或合之先薦寢廟麻始熟也是月也可以築城郭建都邑穿竇窖脩囷倉孟秋嘗補城郭至是則築之城郭所以衛民王公設險以守其國此其所設也孟秋民未可役有破壊姑補之是月則可築矣城郭築則都邑建矣竇窖所以藏粟穿謂鑿土為之脩則理其舊也為國有常經不可一朝廢凡此皆斂藏之事順而行之宜矣乃命有司趣民収斂務畜菜多積聚乃勸種麥毋或失時其有失時行罪無疑孟秋嘗命百官収斂矣至是令有司以之趣民古者視國如家視民如子惟恐不得其所也菜不熟曰饉詩我有㫖蓄亦以御冬多積聚則不特菜而已既戒之積其所已有又勸之殖其所未有麥者接乏之穀也於民尤切麥備四時之氣當秋而種洎夏而熟一或失時將無以濟穀之所不及以失時而得罪亦猶今惰農有刑也夫聖人之愛民甚矣豈肯輕以刑加之至失時之罪懲之不少恕此固所以愛之也後世民自為生上之人反因其有而取之一或犯禁小者鞭扑大者黥隷與古人用刑之意殊矣是月也日夜分雷始収聲蟄蟲坏戸殺氣浸盛陽氣日衰水始涸日夜分則同度量平權衡正鈞石角斗甬又記年候也日夜分與仲春同無長短之差也仲春雷出地奮故發聲仲秋雷已潛藏故収聲雷無聲則百蟄皆藏猶人之坏户也殺氣秋之正氣至是浸盛猶未為極然陰氣浸盛則陽氣日衰一日霜降水涸天地間肅肅乎嚴矣至於度量權衡鈞石斗甬亦以此時而一其制舜覲羣后於四嶽同律度量衡此聖人急先務之也聖人所以一道德而同風俗乃自器用始漢志云凡律度量衡用銅者所以同天下齊風俗也未知舜之所造其亦用銅否乎然舜講於守朝之日而月令以春秋分者後世政治又詳於古周禮質人同其度量壹其淳制犯禁者有罰其所以重之則一也是月也易關市來商旅納貨賄以便民事四方來集逺鄉皆至則財不匱上無乏用百事乃遂仲夏關市無索矣至秋則萬寳告成可以究貨賄所從出為斯民之便也關譏而不征市廛而不税此為來商賈之至要先王之時此道未嘗不易易也易則無險阻矣此固商賈所以願出於王之塗所以願藏於王之市貨賄者商賈之所有也上之人待之易則貨賄納于上納于上則民得所資其事為便其或險阻艱難則貨賄隠于下隠于下則民失所資其事多缺矣夫四方之集逺鄉之至豈有以號召之哉成周之時司關司市設官分職無非為民也以此理財財若無由而足而君有餘財民有餘力其道乃出於此然則財不匱而上無乏用百事乃遂盖自易中得之後世設關則為暴於市則㒺市利豈知易易之義哉凡舉大事毋逆大數必順其時愼因其類季夏之月言舉大事仲秋之月言舉大事季夏則戒之言舉大事之殃仲秋則教之言舉大事之道此道特言於仲秋者秋令踰半國之大事可舉也事雖欲舉當有順而無逆天下之事其成其否自有數默存乎其間謂之大數則尤其不可轉移者是烏可逆哉然數不可得而見能察時者是知數也時可為則數亦可為大如湯武之革命非知數也能知時也是謂順天時既得矣乃因其類而推之聖人作事為萬世法豈一一能自料哉亦不過觸類而通之故曰以類度類以道觀盡仲秋行春令則秋雨不降草木生榮國乃有恐行夏令則其國乃旱蟄蟲不藏五穀復生行冬令則風災數起収雷先行草木蚤死行春令則仲秋之時似春秋而多雨禾頭生耳雨可畏也然或不降則無以助陰氣之肅所以草木榮而不枯國之有恐殺氣不行人有玩心也行夏令則仲秋之時似夏旱則絶無雨矣甚于不降也蟲當藏而不藏穀不當生而復生皆非正也行冬令則仲秋之時似冬秋而多風田野間尤畏之或有數起其傷必多雷已収聲謂之収雷而先行者非時而發也草木未當死而死如冬時夫時正仲秋萬寶告成萬民之所説也一失其正則在天之時或旱或風草木將歸根復命或生或死所以裁成輔相之道不可不謹也

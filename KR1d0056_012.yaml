body:
  text: 月令解卷十二宋張虙撰季冬之月季冬者斗建丑之辰也漢志云紐牙於丑則丑紐也夏正為十二月日在婺女十二月之中三統歴云日在危初度元嘉歴云日在女十度日與斗建常相合丑與子合十二月斗建丑則日在女女亦屬丑也女四星昬婁中旦氐中婁三星西方之宿氐四星東方之宿婁與氐相望也其日壬癸其帝顓頊其神𤣥冥其蟲介其音羽律中大呂其數六其味鹹其臭朽其祀行祭先腎大呂者月建丑之律也季冬氣至則大呂之律應國語云大呂助陽宣氣漢志云呂旅也言陰氣大旅助黄鍾宣氣牙物也鴈北鄉鵲始巢雉雊雞乳此紀十二月之時候也鴈將北矣不曰歸而曰鄉以北非鴈所居也天子居𤣥堂右个乘𤣥路駕鐵驪載𤣥旂衣黑衣服𤣥玉食黍與彘其器閎以奄此當丑上十二月位也命有司大難旁磔出土牛以送寒氣難者所以驅不正之氣邪氣既已難矣若寒氣則非不正之氣也故有以送之東漢志季冬立土牛六頭於國都郡縣城外丑地以送大寒又於立春之日立青旛施土牛耕人於門外以示兆民至後世惟存立春之制而無季冬之制矣征鳥厲疾征鳥注以為鷹隼似失之拘征鳥猶言過鳥也以寒氣之極凡飛禽之類為寒所逼無雲飛之意行於空中者皆猛厲迅疾也乃畢山川之祀及帝之大臣天之神祇是月也命漁師始漁天子親往乃嘗魚先薦寢廟冬寒魚不行乃性定而充肥應鏞云嘗者試而驗之也將薦於所尊敬不敢輕也藥必先嘗膳必品嘗此致敬於君與親也大饗帝則嘗犧牲薦寢廟則嘗魚致敬於天與親也然非必食而嘗之特展視而吿全具耳秋祭曰嘗亦謂物已備成嘗而後祭以見其孝也冰方盛水澤腹堅命取冰冰以入令吿民出五種命農計耦耕事脩耒耜具田器水始冰水則冰矣而未壯冰益壯冰則壯矣而未盛至是則無處不冰水澤腹堅則其堅達於水之腹冰以入入凌室也耦耕二人相耦而耕計謀之也耕必資耒耜農所舊有故脩之田器泛指鎡錤之類故具之命樂師大合吹而罷季春大合樂固有吹矣季秋又習吹至是大合吹而罷樂所以導和氣至是大合而罷皆所以畢一歲之事乃命四監收秩薪柴以共郊廟及百祀之薪燎四監郊各有監以受其入也仲夏命之合百縣秩芻以養犧牲矣至是又命之收秩薪柴以共祭祀燔燎之用也是月也日窮于次月窮于紀星回于天數將幾終歲且更始專而農民毋有所使天子乃與公卿大夫共飭國典論時令以待來歲之宜十二月之辰在丑曰星紀蓋月當建丑日月星辰之行至此月皆周於故處既㑹之後於是又分行焉至次年建丑之月複㑹如初周而復始次舍也紀㑹也日曰窮日盡於此月曰窮月盡於此星曰回非一星故也數於此而一終數未正終其謂之終蓋幾而近之也以去年季冬三百五十四日未滿三百六十五日未得正終然數之終乃歲之始時當更始事事物物悉為變改農事為尤重專者欲其一意於耕稼之事徭役之則志散而失業尤上之所當戒也乃命大史次諸侯之列賦之犧牲以共皇天上帝社稷之饗乃命同姓之邦共寢廟之芻豢命宰歴卿大夫至於庶民土田之數而賦犧牲以共山林名川之祀凡在天下九州之民者無不咸獻其力以共皇天上帝社稷寢廟山林名川之祀國之大事在祀莫尊於天地莫親乎宗廟而山川諸祀次之凡祀無不用犧牲也惟宗廟以芻豢言蓋犧牲則泛指芻豢則見其畜養之精以同姓之邦共之所以親宗廟也諸侯之國有小大命太史書列之以共賦卿大夫采地亦有小大歴而數之則小宰之事其非采地以其邑之民多少賦之雖然民非神之福不生雖有邦國采地此賦要由民而出也古先聖王先成民而後致力於神唯能成於民則凡普天之下食土之毛者無不咸獻其力以共其祀也季冬行秋令則白露蚤降介蟲為妖四鄙入保行春令則胎夭多傷國多固疾命之曰逆行夏令則水潦敗國時雪不降冰凍消釋行秋令則季冬之時似秋白露降於秋者冬行秋令則白露降丑為鼈蟹斂藏之氣不厚故反爲妖四鄙入保畏兵之象以秋為金故也行春令則季冬之時似春春則句者出萌者達今冬行春令則生氣蚤至不充其性所以多傷生不充性疾久不差時運之逆莫大于此行夏令則季冬之時似夏水潦盛昌夏之時也冬行夏令則水潦至於敗國冬者雪之時謂之時雪時雪不降而冰凍消釋盛陽爍之也

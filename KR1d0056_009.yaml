body:
  text: 月令解卷九宋張虙撰季秋之月季秋者斗建戌之辰也漢志云畢入於戌則戌畢也夏正為九月日在房九月之中三統歷云日在房五度元嘉歷云日在氐七度日與斗建常相合戌與卯合故九月斗建戌則日在卯房正屬卯也房四星昏虛中旦栁中虛二星北方之宿柳八星南方之宿虛與柳正相望也其日庚辛其帝少皥其神蓐收其蟲毛其音商律中無射其數九其味辛其臭腥其祀門祭先肝無射者月建戌之律也季秋氣至則無射之律應周語云無射所以宣布哲人之令德示民軌儀漢志云射厭也言陽氣究物而使隂氣畢剝落之終而復始亡厭已也鴻鴈來賓爵入大水為蛤鞠有黃華豺乃祭獸戮禽鴈當仲秋自北而來至是則如賓言來而得所如賓之授館也造物之妙或變或化難以理詰爵入大水為蛤既非可以形求又非可以色求所可得而言者當春發生則鷹化為鳩鼠化為鴽其化者亦不自知其化此春時也當秋冬之時爵之為蛤雉之為蜃非化也入大水為之此由得水而然也草木雕零鞠始茂盛物皆黃而落鞠獨黃而華此其異也豺之性貪而忍祭獸知有先矣以獸為未足又用禽而戮之凡此用物以紀時也天子居總章右個乘戎路駕白駱載白旗衣白衣服白玉食麻與犬其器亷以深此當戌上九月位也是月也申嚴號令命百官貴賤無不務內以會天地之藏無有宣出國之號令何嘗不嚴至是又申之使無懈惰皆所以順時也前乎此命百官始收斂今則命百官貴賤無不務內蓋人之品有貴賤其具天地之性則無貴賤當天地嚴肅之時務自收斂豈惟貴者當然賤者亦當然季春言不可以內至季秋則言無不務內皆因時也天地之氣有發亦有藏人豈能自異於天地藏則不復宣出矣會猶參也以是而觀人之一身與天地並立而為三頃刻之中或呼或吸皆有隂陽一日之中或作或息必順晝夜則一嵗之中或出或內豈能離春秋之舒慘乎乃命冢宰農事備收舉五穀之要藏帝藉之收於神倉祗敬必飭仲秋趣民收斂猶未備也至是始備收言無一物之不收也冢宰於此時可以舉五穀之要要如宰夫之治要司會之月要多寡之總數也冢宰將以制國用不舉其要國用何由而制然此特舉其要而已漢文帝問宰相一嵗錢穀出入之數幾何周勃辭以不知是失舉要之職陳平辭以有主者又失舉要之義唐至以宰相領度支領鹽鐵失之益逺矣帝藉者藉田所種之穀以供粢盛也倉謂神倉重粢盛之所委不敢待以常用曰祗曰敬而又飭之無或忽也古人事神之道寧過乎恭毋失之忽是月也霜始降則百工休乃命有司曰寒氣總至民力不堪其皆入室工居四民之中亦居六職之中國之器用所資也霜降則休注謂寒而膠漆之作不復堅好此未盡古人之意蓋當休老勞農之時凡終嵗勤動者無不休矣百工之役使之少息此亦聖人順時之政也夫積隂成寒其氣總至嵗時之所同也民生畏寒入此室處亦其情之所同也又何待上之人諄命之而後知所避哉聖人之於民不啻父母之視其子有害必使之逺惟恐或罹其害也有災必使之去惟恐或陷於災也癢癢疾痛甚於在己民未嘗以力之不堪告於上也而上之人探其情言之為是恩勤之教嗚呼仁哉上丁命樂正入學習吹是月也大饗帝嘗犧牲告備于天子上丁上旬之丁丁取文眀之盛習吹則以是月將大饗也春習舞秋習吹注謂春夏重舞秋冬重吹諸解則謂各舉其一相備之辭竊謂舞之為藝其綴兆疾舒之節當春習之熟矣惟有聲者隔而不習則聲必澀古詩所謂久不吹之澀欲無所以仲春之月上丁樂正習舞矣至仲丁又命習樂注習樂者習歌與八音豈非有聲者不可遽已邪然則饗帝之前俾之習吹正為此耳矧秋屬金金有聲者亦因其時大饗帝者言遍祭五帝也嘗者宗廟之秋祭也以秋祭之犧牲告備于天子以物成可嘗之時尤所重故也仲秋視全具至此又告備古人於祭祀誠篤如此不厭其煩也嘗與蒸秋冬祭名不當别求義秋而嘗案原本而嘗上脫秋字今補則月令季秋有嘗犧牲之文冬而蒸則月令孟冬有大飲蒸之文周之嘗以仲此言於季者彼取時之仲此取時之盛飲蒸則蒸祭畢而飲也合諸侯制百縣為來歲受朔日與諸侯所稅於民輕重之法貢職之數以逺近土地所宜為度以給郊廟之事無有所私疏云諸侯謂畿外國百縣謂鄉遂是則畿外諸侯以在逺故合之縣內諸侯則徑施制焉皆欲令受正朔也秦以建亥為正故於九月言來嵗之禮百縣在畿內取民之法一定此鄭氏言周禮畿內用貢法是也諸侯則如周禮邦國用助法所以上之人從而制之輕重之法諸侯所取乎下者貢賦之法諸侯所共乎上者逺近所宜則若周禮男服貢器物衛服貢財物之類土地所宜則若禹貢徐州貢土五色揚州貢金三品之類以此為度昭然可考夫人君享四海九州之奉豈為一己之私哉蓋以給宗廟之事為主也大宰以九貢致邦國之用而一曰祀貢則天下之用未嘗先於祀事者是月也天子乃教於田獵以習五戎班馬政命僕及七騶咸駕載旌旐授車以級整設于屏外司徒搢撲北面誓之天子乃厲飾執弓挾矢以獵命主祠祭禽於四方周禮大司馬中秋教治兵遂以獮田彼以中秋而此以季秋中秋則以順時氣季秋則以農隙也夫田獵之教非觀美也正所以習武備也馬政有國之急務如周禮趣馬巫馬之簡治校人廋人之乘阜圉師牧師之牧養莫不有政焉平時講之熟矣至田獵之時又從而班之周禮夏官司馬則凡馬職皆屬夏官故仲夏班馬政所以順天時也今季秋又班馬政則以田獵故也僕掌車騶掌馬咸駕以馬駕車也旌旐所以為表識授之以級自上而下不可亂行此整設也屏外則天子師田張幕有幕故亦有屏司徒設教八曰以誓教恤則民不怠誓以犯田法之罰搢撲于帶以示有事于教無事于刑北面則又以教兵本主殺也飾戎服之飾也從而厲之所以振揚其威武親執弓挾矢以獵以萬乘之尊而從事于弓矢以天光之穆穆而周旋於馳逐之樂則武事日以張軍容日以壯此田獵之禮古人之所重非若後世視為觀美也主祠典祭祀者得禽則以祠四方之神周禮秋致禽以祀祊鄭康成云祊當為方秋田主祭四方報成萬物是月也草木黃落乃伐薪為炭蟄蟲咸俯在內皆墐其戶炭以禦寒人所資非不急也必待草木黃落之後始取之物既歸根用亦隨宜斧斤以時入山林此亦王政之一也蟄蟲知避殺氣使其首向內嚮知壞戶而已今又墐其戶壞益也謂稍小之也墐塗閉之蟲知畏殺氣如此人靈於物可不謹所避哉乃趣獄刑毋留有罪收祿秩之不當供養之不宜者趣之為言督之也為政無取於督趣為獄刑則惡乎淹滯不惡乎督趣自入秋來孟則嚴斷刑仲則申嚴百刑至季則趣獄刑無一時不為刑慮古人以刑為重事諄諄於告戒之間易曰山上有火旅先王以明謹用刑而不留獄旅為不處而聖人以不留獄象之信矣桎梏之苦箠楚之痛望而畏之此豈可留也祿秩之不當供養之不宜皆從而收之亦以順天時也夫祿秩之不當無時不可收豈獨嚴於秋令天下猶一家耳一家之內凡所給豫豈無幸得者豈無過受者豫之於前而收之於後豫之於平日而收之於秋此亦政也供養之物亦猶是也月令之所食多取乎時之生尅內則之所食多取乎時之肥美不宜則慮其反為己害尤嚴於秋也大抵三秋之政雖條畫有不同然其大指惟務於嚴肅不欲其弛玩而無度惟務於收斂不欲其散漫而無統聖人因時而出政不如是則幾於逆天是月也天子乃以犬嘗稻先薦寢廟稻即周禮稻人掌稼下地所生者至是始熟故薦之穀之種最多惟稻之熟最晚薦新於孟秋之月薦晚於季秋之月或蚤或晚無不薦也季秋行夏令則其國大水冬藏殃敗民多鼽嚏行冬令則國多盜賊邉竟不寧土地分裂行春令則暖風來至民氣解惰師興不居季夏水潦盛昌故行夏令則為大水然其害猶未即見而殃敗乃成於冬大水所積也鼽嚏之疾亦水氣所成歟盜賊隂類也秋盡則為冬令今未盡而行冬令所謂重隂盜賊之起亦時使然四境之不安土地之分裂皆生於盜賊之多也秋氣肅殺而行春令則風為暖風民失揫斂之義則有懈惰之情師興不居師興則勞民矣又遷徙無常民愈勞也此皆非時之災也

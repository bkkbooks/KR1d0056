body:
  text: 月令解卷二宋張虙撰仲春之月仲春者斗建卯之辰也漢志云冒茆於卯則卯冒也顏師古曰茆謂叢生音莫保反夏正為二月日在奎二月之中三統歷云日在婁四度元嘉歷云日在奎七度日與斗建常相合卯與戌合二月斗建卯則日在戌奎星屬戌也奎十六星昏弧中旦建星中弧九星建在斗之上弧與建相望也其日甲乙其帝大皥其神句芒其蟲鱗其音角律中夾鍾其數八其味酸其臭羶其祀户祭先脾夾鍾者月建卯之律也仲春氣至則夾鍾之律應周語云夾鍾出四隙之細漢志云言陰夾助大蔟宣四方之氣而出種物也夾鍾又謂之圜鍾以春主規言之也始雨水桃始華倉庚鳴鷹化為鳩此記二月時候也漢初以雨水為二月節劉歆改雨水為正月中驚蟄為二月節雨水則不復冰矣桃始華春華之盛莫如桃倉庚黃鸝也出于幽谷遷于喬木故鳴也詩人取其嚶嚶之聲當春之時物有化此造物之一妙也鷹與鳩迭相化月令言鷹化為鳩王制言鳩化為鷹然後設罻羅鷹鷙而鳩仁春陽育物使鷙者能仁月令書之鳩化為鷹變而之不仁矣故月令不書天子居青陽大廟乘鸞路駕倉龍載青旗衣青衣服倉玉食麥與羊其器疏以達此當卯上二月位也仲月所居在左右之中不謂之中而謂之大廟月令有寢廟有大廟寢廟祖宗之廟也大廟為天子所居而有廟稱如今稱廊廟稱廟堂無嫌也方慤解云以其或享神於此故謂之廟若是則大廟之內凡百神祗隨四時而祀者常在其中故以廟稱尊之曰大天子不敢以為己居也此吕氏之制也案月令明堂即考工記五室十二堂之制四正之堂稱大廟八廂稱左個右個廟與個乃深淺之名廟者穆然而深也不必享神之所始稱廟爾雅云室有東西廂曰廟大廟有室而無寢是月也安萌牙案今本牙作芽古本通用牙養幼少存諸孤皆所以助生氣也萌芽指草木之類萌動則始茁牙則浸長矣安之恐觸之而折也幼少指人周禮大司徒保息養萬民一曰慈幼注慈幼謂愛幼少也産子三人與之母二人與之餼後世遂有收養委棄小兒者至於幼而無父曰孤則尤不可不存之孤而不存則類絶矣待人詳於待物擇元日命民社孟春以元日祈穀曰以則不待擇謂正月朔旦也今命民社曰擇元日與擇元辰同郊待牲言社日用甲此之元日蓋甲日也甲為日之始猶朔旦也大夫以下成羣立社曰置社則民固有社然必出天子之命命有司省囹圄去桎梏毋肆掠止獄訟囹圄禁人之所則省而察之恐入者被苦也桎梏禁人之器則去而除之恐害人手足也肆謂暴尸掠謂箠楚則戒之方天地作解之時人應之為解之事皆所以順生氣然非上之人得遍行之故以命有司是月也玄鳥至至之日以大牢祠于髙禖天子親往后妃帥九嬪御乃禮天子所御帶以弓韣授以弓矢于髙禖之前商頌言天命元鳥降而生商故史記商本紀因謂簡狄行浴見元鳥墮其卵取吞之而生契其言遂流於誕孔穎達詩疏引仲春元鳥至之日以大牢祀于髙禖元鳥春分而至氣候之常記其祈福之時故言天命元鳥則詩疏之言可信是知髙禖之祀自古有之矣惟月令所言髙媒之祀其禮為重天子親往異乎常祀祠用大牢幾過乎郊昔孔子垂教怪神之事置之不語上下神祇之禱不取子路故孔子於祭禮未嘗不謹亦未嘗或流於誕經之所言為農有祈為兵有祈與凡水旱有祈皆正也周禮六祝六祈六辭六號非不多也獨不見禖宫嘉祥之事雖然精神所感何幽不格念慮所通惚恍有象髙禖之祥豈容億度禮記之載自有舊典朝家之行又有成式惟在上之人確守之耳是月也日夜分雷乃發聲始電蟄蟲咸動啓户始出先雷三日奮木鐸以令兆民曰雷將發聲有不戒其容止者生子不備必有凶災日夜分與仲秋同無長短之差也春則雷發聲秋則雷收聲雷不特發聲而已電是陽光至此陽氣漸盛其光乃見春則蟄蟲啓户秋則蟄蟲壞户孟春蟄蟲始振則振而已猶未出也今則啓户而出矣雷之發聲陰陽家可以數推故先雷三日可以令兆民玊藻言疾風迅雷則必變雖夜必興衣服冠而坐况聞其發聲之始乎其有不戒容止生子不備必有凶災無足怪也古者愛民如愛子弟木鐸所以振文教奮而警之何其慮之深哉日夜分則同度量鈞衡石角斗甬正權概制器尚象雖曰多端然不出三者度長短者不失毫釐量多少者不失圭撮權輕重者不失黍絫當日夜之分天時適平聖人因是稽器於人以上承天之所為而下正其所為同律度量衡自舜以來謹之矣石出於衡斗甬出於量權者衡之用概者量之用曰同曰鈞則致其謹曰角曰正則致其審矣是月也耕者少舍乃修闔扇寢廟畢備毋作大事以妨農之事農之作也出而在田農之息也入而在舍曰少舍則暫焉而己又乘其隙而修闔扇注云用木曰闔用竹葦曰扇似失之鑿此之闔扇不過當寒時塞向墐戶今修之則亦啓其向之塞闢其户之墐而已寢廟畢備句當屬下古人慮農事之或妨也謂農之闔扇可乘間而修之若國之寢廟既已畢修則不必作此大事以妨農之事蓋寢廟告成無有虧闕不俟修也是月也毋竭川澤毋漉陂池毋焚山林竭澤而漁古人所惡况當春時哉陂池儻漉而取之亦竭矣春搜火弊獻禽注火弊火止也春田主用火因焚萊除陳草此惟搜時為然耳常時固有禁也皆所以遂生物之性也天子乃鮮羔開冰先薦寢廟鮮注讀為獻或讀如字繫牲曰鮮用羔羊為火畜故也不以羊而以羔方少陽用事之時而又品物少故也先薦寢廟所以重時物且不敢以人之餘奉神也王者之於祖禰以人道事之則有寢以神道事之則有廟月令凡薦新之類皆曰寢廟意者廟則四時有常祭寢則以時物薦新言寢廟與單言廟不同上丁命樂正習舞釋菜天子乃帥三公九卿諸侯大夫親往視之仲丁又命樂正入學習樂孟春命樂正入學習舞矣至是又以上丁之日命樂正習舞唯恐舞者之容節有一或失也鄭氏注將舞必釋菜於先師以禮之則此之釋菜正天子與羣臣入學之禮天子與羣臣親往視其習舞無違禮矣至仲丁始命樂正入學習樂習樂則凡樂無所不習不特舞樂樂者天地之和也古人作樂所以導和於天下乃時之常事非必有為而然也是月也祀不用犧牲用圭璧更皮幣孟春之時犧牲不用牝而已至是舉犧牲皆不用矣若髙禖之用大牢開冰之用羔此二者乃天子所行之事每歲惟一舉不以常禮論也以圭璧易犧牲非但用圭璧又用皮幣以更之仲春行秋令則其國大水寒氣總至寇戎來征行冬令則陽氣不勝麥乃不孰民多相掠行夏令則國乃大旱暖氣蚤來蟲螟為害行秋令則仲春之時似秋秋時多雨所以為大水秋將入寒所以寒氣總至寇戎乘金氣也行冬令則仲春之時似冬仲春之時陽氣宜勝今則不勝麥為寒氣所害故不孰民之相掠由無麥也行夏令則仲春之時似夏夏時多旱暖氣未當來而來蟲螟暖氣所生也

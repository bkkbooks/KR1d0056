body:
  text: 月令解卷三宋張虙撰季春之月季春者斗建辰之辰也漢志云振美於辰則辰振也夏正為三月日在胃三月之中三統歷云日在胃七度元嘉歷云日在胃九度日與斗建常相合辰與酉合故三月斗建辰則日在酉胃星屬酉也胃三星昏七星中旦牽牛中七星南方之宿以其數有七謂之七星二十八宿皆星也獨謂南方之中星為星者以星為陽之精南方之中得陽之正故也牽牛六星北方之宿七星與牽牛相望也其日甲乙其帝大皥其神句芒其蟲鱗其音角律中姑洗其數八其味酸其臭羶其祀户祭先脾姑洗者月建辰之律也季春氣至則姑洗之律應周語云姑洗所以修潔百物考神納賓漢志云洗潔也言陽氣洗物辜潔之也桐始華田鼠化為鴽虹始見蓱始生此記三月時候也桐之為木見於詩定之方中云可中琴瑟亦世有用之材故取以紀時鼠穴於地者忽為飛禽此尤造物之神也虹螮蝀也朝見於西莫見於東日之氣也蓱水草天子居青陽右個乘鸞路駕倉龍載青旗衣青衣服倉玉食麥與羊其器疏以達此當辰上三月位也季月居右個是月也天子乃薦鞠衣于先帝鞠衣后之蠶服也蠶事近矣欲求福祥之助乃薦此服於神先儒以先帝為大皥之屬蠶桑雖后事天子未嘗不親焉其始也薦鞠衣以求福其後也皮辨素積卜三宫之吉者入於蠶室皆所以重其事也命舟牧覆舟五覆五反乃告舟備具于天子焉天子始乘舟薦鮪于寢廟乃為麥祈實爾雅言天子造舟諸侯維舟則天子固有所駕之舟也舟牧主舟之官也至尊所乘不可不謹五覆五反防其傾漏乃告備具天子於是乘舟亦猶後世以春時出遊歟惟天子不以無事而出因薦鮪于寢廟所以乘舟者欲薦鮪也禮季冬獻魚春薦鮪鮪曰王鮪異乎常魚故春特以薦焉薦鮪之日為麥祈實麥而不實與無麥同故先時致祈為民之切也是月也生氣方盛陽氣發泄句者畢出萌者盡達不可以內春之氣固主生矣至於季春始為盛陽生於子出於寅及乎辰則始發泄由辰而前句者非不出也出之為未畢萌者非不逹也逹之為未盡至於辰乃畢乃盡焉春主發散則出而外之時也天子布德行惠命有司發倉廪賜貧窮振乏絶開府庫出幣帛周天下勉諸侯聘名士禮賢者凡所布施皆順天也成周盛時鄉師周萬民之囏厄司門養死政之老孤其天患民病則司救以王命施惠邦之委積遺人掌之野之鋤粟屋粟旅帥聚之所以待貧窮乏絶者至矣月令之布德行惠蓋倣其近似者為之故亦以之命有司榖藏曰倉米藏曰廩貧窮曰賜賜則所以豫之乏絶曰賑賑則貸之而已此猶未足以見其宣散也至於開府庫以出幣帛凡天下之諸侯皆勉之以從事以之聘名士以之禮賢者蓋天下之貧窮乏絶天子豈一一能遍所勉諸侯行之者惟以聘禮名士賢者為急此所謂不遍物之智也是月也命司空曰時雨將降下水上騰循行國邑周視原野修利隄防道達溝瀆開通道路毋有障塞周禮司空掌邦土月令亦設此官而命之春時多雨下水上騰蓋水氣相感而然雨多害物故為之備循行國邑之間周視原野之地有隄防則當修利有溝瀆則當道逹有道路則當開通使之無有障塞如此為備則雨多不為害矣田獵罝罘羅罔畢翳餧獸之藥毋出九門當春物生鳥獸方字乳又非為搜除害之時傷之則逆天時此田獵之具所以毋出九門每門之內或有藏此具者皆不得出禁之也是月也命野虞毋伐桑柘鳴鳩拂其羽戴勝降于桑其曲植籧筐后妃齊戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事蠶事既登分繭稱絲效功以共郊廟之服毋有敢惰野虞如周禮山虞澤虞之類桑柘蠶所食戒之無伐愛其所食也仲月鷹化為鳩至是其羽始備拂披拂也詩以雎鳩鳲鳩比后夫人之德故喜觀其拂羽以為蠶之候戴勝織紝之鳥頭上所戴若勝然后妃齋戒如承大祭觀採桑示帥先天下也婦女以蠶為事者觀謂遊樂也案此句舊在如詩鄭之溱洧下於文不順今改正如詩鄭之溱洧豈可不禁婦使亦省恐以他役奪其務也凡此皆所以勸其事也登如麥之登榖之登效功注謂敕往蠶者勸戒之似失之迂此直指蠶之登與孟夏后妃獻繭不同矣分繭稱絲使各效其功之多寡以共郊廟之服無有敢惰者以上之人所以躬率者誠也是月也命工師令百工審五庫之量金鐵皮革筋角齒羽箭幹脂膠丹漆毋或不良百工咸理監工日號毋悖于時毋或作為淫巧以蕩上心天氣和適造作為宜工師百工之師孟子工師得大木是也故命之令百工五庫以五材而得名凡所治之材不離乎五材令之使審焉不謂之材而謂之量以其材各有所受也一有不良工則審之百工咸理不特一工為然也監工日號不特一日為然也弓人春液角夏治筋秋合三材寒定體此謂之時不可悖也夫工固有巧也然過乎巧則為淫無得過乎淫使生奢泰之心是月之末擇吉日大合樂天子乃帥三公九卿諸侯大夫親往視之自孟春樂正入學先習舞仲春上丁又命樂正習舞至仲丁樂正入學習樂則樂已成矣是月之末擇吉日大合樂天子與羣臣親往視之習樂在學而合樂亦在學此樂之極盛也是月也乃合纍牛騰馬遊牝于牧犧牲駒犢舉書其數此不過欲其生息之多書其數者亦恐沒所有也合國難九門磔攘以畢春氣注謂難陰氣非也聖人順陰陽之氣惟恐邪之有以干正天地之間有不正之氣聖人於是有難之之法周禮方相氏帥百隸而時難以索室驅疫難之法所以逐不正也陰陽天地之正氣也不可以邪干之季春之難謂之畢春氣春氣發生有不正者干之則發生之功不遂於是乎難畢者令春氣得以成功也磔攘磔牲于九門之上自方相氏時難之法廢而後有磔攘九門即上言九門謂之國則總內外言之也季春行冬令則寒氣時發草木皆肅國有大恐行夏令則民多疾疫時雨不降山陵不收行秋令則天多沈陰淫雨蚤降兵革並起季春之時似冬冬之氣為寒故寒氣時發草木皆肅謂枝葉無條暢之意國有大恐又甚於國時有恐以嚴寒可畏故也季春之時似夏則民多疾疫溫氣大勝也陽亢為旱故雨不降高者暵於熱故山陵之物不收季春之時似秋則天氣沈陰非春和時秋有淫雨春乃如之兵革之起金氣之應也

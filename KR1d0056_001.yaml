body:
  text: 月令解卷一宋張虙撰孟春之月孟春者斗建寅之辰也漢志云引達於寅則寅引也夏正為正月日在營室正月之中三統歷云日在室十四度元嘉歷云日在室一度疏謂月令據其大略不細與歷同日與斗建常相合寅與亥合正月斗建寅則日在亥室星屬亥也案此說由不知歲差故以為據其大略又泥於子與丑合寅與亥合之說皆非也營室二星昏參中旦尾中每月必記昏旦中星者人君南面而治仰觀天文以授民事故舉南方之中星為候月令中星疏亦謂據大略而言不與歷正同但一月之內有中者即得載之案此亦由不知歲差故有是說中星一晝一夜分天之半參十星西方之宿尾九星東方之宿參與尾相望也其日甲乙左傳云天有十日以應五行五行播於四時故十日各有所屬甲乙屬春注乙之言軋也時萬物皆解孚甲自抽軋而出因以為日名焉疏云日功之名其帝太皡其神句芒據經惟曰其帝其神初不言祀正前漢魏相傳言東方之神大皥乘震執規司春者而注疏以為祀其帝又祀其神有主必有配皆以義起禮耳後世因其言則祀禮不復廢矣然其帝其神名號亦自取義元氣廣大謂之皥天則皥者廣大之意木初生時句曲而有芒角故曰句芒其蟲鱗鱗亦謂之蟲所謂鱗蟲三百六十龍為之長注鱗龍蛇之屬有孚甲似木其音角疏謂春時調和樂以角為主角觸也物觸地而出戴芒角也律中大蔟大蔟者月建寅之律也律候氣之管以銅為之實以葭灰以羅縠覆之置緹縵室中孟春氣至則大蔟之律應而吹灰中者氣與律相當也國語云大蔟所以金奏贊陽出滯漢志云蔟奏也陽氣大奏地而達物也其數八金木水火得土而成木數三得土五數故為成數八其味酸其臭羶在口者為味有形則有味木曰曲直而曲直作酸木實之性然則木實酸通於鼻者為臭有氣則有臭凡草木所生其氣羶也其祀户祭先脾凡五祀皆有功於人故立祀以報之又各從其類也春祀户者户在門之內易節卦不出户庭不出門庭解者謂竒爻在前户之象偶爻在前門之象是竒者為户偶者為門春祀户秋祀門户祀其出門祀其入户在內於人為尤近當冬寒時塞向墐户春氣和則人闢户矣故祀其神祭用牲之藏時各有所先既非本屬又不可論相生又不可論相尅雖與古尚書文合又不可通其義此蓋不過示有所先耳當以人六脈之次第求之自右手起以命脈為主於是為脾為肺乃入左手為心為肝為腎此其次第非出於人之私也故用牲之藏其所先者亦依之而春夏中央秋冬之際定矣故春先脾東風解凍蟄蟲始振魚上冰獺祭魚鴻鴈來此記正月時候也冰凝則魚潛而下冰釋則魚躍而上獺祭魚者以魚方可取祭而後食猶人食必祭也天之生物自有禀性之善者特其偏耳鴈隨陽者禹貢謂之陽鳥鴈之隨陽居無定所從中土視之自北而南謂之來自南而北亦謂之來孟春之來自南方而北也天子居青陽左個乘鸞路駕倉龍載青旗衣青衣服倉玉天子每時居處及所乘車馬所建旌旗所服衣玉所食牲榖及器物之屬皆順時氣也春為青陽吕氏取之以名天子所居名與居正相稱也此當寅上正月位也孟月則居左個個者左傳置饋於個釋者謂個廂也鸞路者明堂位言鸞車有虞氏之路車之有鸞不特有虞氏之制意自有虞氏始然春乘鸞路取其色非取其聲後漢輿服志耕車注車必有鸞而春獨曰鸞路者鸞鳯類而色青故以名春路陸佃禮圖於太常條下謂青路謂之鸞路者則鸞青鳯故也以此知鸞路正取其色之青倉龍者倉青也曲禮言左青龍倉龍即青龍以馬為龍周禮馬八尺以上為龍此天子所駕也詩疏騏青而微黑青旗旗色尚青也載謂建之於車周禮交龍為旗旗必有鈴青衣所衣之衣尚青色也青色為衣古未之見唯近世夏休辨六服之色以衮之色如蓘蓘青草也鷩赤毳黃希白元黑皆然倉玉玉之青者服謂冕旒及笄并佩玉尚青色也玉藻水蒼玉以文色似水之蒼周禮蒼璧青圭此皆玉之青者山海經武玞石似玉青地白文色揚雄羽獵賦說玉眩耀青熒顔師古注言其色青而有光耀也食麥與羊其器疏以達麥木榖也疏云麥實有孚甲屬木尚書五行傳以羊為火畜春氣貴和食其當方之榖而以火畜助之食得其調則疾不生亦所以安性也古人之食惟取其宜而已不以珍異進也器疏以達春主發散疏則散達則發或謂疏為刻鏤之象求之太過此特言其開暢而已是月也以立春先立春三日大史謁之天子曰某日立春盛德在木天子乃齊立春之日天子親帥三公九卿諸侯大夫以迎春於東郊立春為正月節迎春於東郊者人君後天而奉天時當其氣至則出郊以迎所以導之也太史禮官之屬先三日謁之將以致天子之齊也盛德四時皆有德或生或長或斂或藏是其德也天地之大德固難於形容至其分而為四時則各有所在故因其分而言其盛則天地之德於是著矣春之盛德在木木屬春也凡見於萬物之生木之德也親帥羣臣迎之於東郊所以重其至示敬也迎迎其氣耳非有神矣或謂即太皥句芒故迎而祭之注引文曜鉤謂靈威仰還反賞公卿諸侯大夫於朝命相布德和令行慶施惠下及兆民慶賜遂行毋有不當古者賞以春夏順時氣也迎春之賞蓋喜其氣之至故行賞以飾喜尤為順時之大者然是賞也惟及於公卿諸侯大夫而己未及兆民也於是命之相臣指居輔佐之任者布德以助春之德和令以和春之令曰慶曰惠又出乎賞之外以行以施及於兆民慶賜則又總言上之所與毋有不當使當得者皆得所豫雖廣而無一妄豫者古人淳厚安有欺罔之事邪乃命大史守典奉法司天日月星辰之行宿離不貸毋失經紀以初為常周禮大史之職掌六典逆邦國之治八法逆官府之治則守典奉法是其職也然頒嵗年於官府都鄙頒朔於邦國皆大史職也豈惟六典八法而已日月星辰行於天者大史司之宿如天文志填星居宿其國案漢書天文志作填星所居國吉居宿久國福厚此刪改其文國字下應脫一吉字五星所聚宿其國王案天文志作其國王天下此刪去天下二字是宿也離如月離於畢是離也大史司之曰宿曰離皆無貸者言占驗不差也案月令乃言推步不差耳非言占驗經紀謂日月星辰行天之躔度初如歷法之元孟子所謂故也用是為常此不可變者治歷明時本貴乎革若其法之初則不可得而易是月也天子乃以元日祈榖於上帝乃擇元辰天子親載耒耜措之於參保介之御間帥三公九卿諸侯大夫躬耕帝藉案藉田今本作籍非天子三推三公五推卿諸侯九推反執爵于大寢三公九卿諸侯大夫皆御命曰勞酒元日或以為吉日或以為善日其說則同然以書所稱元日觀之則元日乃正月朔旦也吕氏創法則以元日行禮祈榖躬耕本一事其行禮則同一日既曰元日又曰元辰元日即朔日元辰於是日取其時也十二支謂之辰元日曰以則以朔日行之無俟乎擇元辰曰擇則於元日之中取其辰之良者用之故謂之擇也左傳郊祀后稷以勸農事故啓蟄而郊郊而後耕此周制也吕氏不遵此禮月令春祈榖夏亦祈榖祈榖非郊也祈榖禮畢於是講躬耕之禮耒耜田器也措之參保介之御間參凡車上人皆可言參乘保介注以為衣甲之士非也詩臣工云嗟嗟保介介猶副也諸侯來朝介或九人七人五人天子之保介猶諸侯之保介也則介豈謂衣甲天子之車安得有甲士惟耒耜之器非車上所能容所以措之於左右之間御間即謂天子所坐之處帥公卿諸侯大夫以身帥之也躬耕者祭統云天子諸侯非莫耕也身致其誠信誠信之謂盡盡之謂敬敬盡可以事神明帝藉古說謂為天神借民力所治之田以藉為借或云藉蹈藉也躬親履踐之義皆不若應劭以為典籍蓋干畞之田必有籍以紀之曰帝藉則與民之公田異矣周禮甸師帥其屬而耕耨王藉則帝藉即王藉帝藉之帝非指天也曰三推五推九推此則尊卑勞逸之辨也人君惟知稼穡之艱難親耕之禮蓋體民也耕藉而反亦己勞矣故飲之酒亦猶勞農也然觀執爵之語則非有盛禮如平時即執爵而酳意者持酒如勸賓之禮大寢非燕之所所以示禮之特名曰勞酒此特為耕罷而設御如御食於君之御是月也天氣下降地氣上騰天地和同草木萌動天地之氣亦人之氣也孟冬之月天地不通閉塞而成冬今也一降一騰和同無間所謂天地交泰故生草木萌動之為言亦猶人初受氣於胎元嚮之靜者自此動矣王命布農事命田舍東郊皆修封疆審端徑術善相丘陵阪險原隰土地所宜五榖所殖以教道民必親躬之田事既飭先定準直農乃不惑農事布於春而斂於秋農事之布必王命之不曰天子而曰王不以天子之尊嚴臨下也田非田畯之官即謂凡有田者舍於東郊謂民畢出於廬舍也觀此一節即周禮大司徒之職大司徒有條目易曉此乃總而論之蓋自商鞅開阡陌之後古制隳廢大司徒之職亦難復舊今惟因其近似者行之修封疆審端徑術即制其畿疆作其溝封正其道塗均其地域也善相邱陵阪險原隰土地所宜五榖所殖即五地之物辨以土㑹十有二土十有二壤辨以土宜五物九等辨以土均然後稼穡樹藝之所宜畢見於此而始可以任地事也度土而積之謂之封界畫以守之謂之疆每歲修之使勿壞術與遂同夫間有遂遂上有徑審則詳視之端則理正之相如詩言相其隂陽古之勤民如此至其教道之方不徒形之空言必躬親以率之民烏得而不從田事既飭言治田之事各有條理矣亦有所先各適其平謂之準各得其正謂之直民無惑心則爭競之念自絶先王經理天下如一家然是月也命樂正入學習舞樂正者樂官之長學者教育人才之地文王世子云釋菜不舞則習舞非為釋菜也春陽既動萬物出地故王者習舞所以應之樂以舞為重古人所致意衆仲之對季札之觀皆舞也夫子與顔淵論韶舞與賓牟賈論武王之舞亦舞也其屈伸俯仰綴兆疾舒皆關於造化孟春之習豈區區為釋菜哉且月令所言自有次第習舞之後乃始習樂習樂之後乃大合樂則習舞居先見舞之為重也乃修祭典命祀山林川澤犧牲毋用牝禁止伐木毋覆巢毋殺孩蟲胎夭飛鳥毋麛毋卯毋聚大衆毋置城郭掩骼埋胔重祭禮故於歲始而省録之曰山林川澤則羣祀無不舉也犧牲毋用牝為傷妊也此山林川澤之禮然耳若天地宗廟大祭雖非孟春亦不用牝也斧斤以時入山林當草木萌動之時固禁止之覆巢則鳥何以生育孩蟲胎夭皆不可殺獸曰麛鳥曰卵亦不用皆所以遂其生育之性飛鳥或謂初飛之鳥據仲秋羣鳥養羞注有翼曰鳥閩蚋之屬此其類也不聚大衆大衆聚則宰殺必多不置城郭置則填築必傷物骨枯曰骼肉腐曰胔或掩之或埋之推其所愛於其生者以及其死者也是月也不可以稱兵稱兵必天殃兵戎不起不可從我始兵主殺以殺氣而逆生氣所以有天殃老氏曰用兵不敢為主而為客蓋不可從我始之謂也湯之造攻自鳴條用兵之義未嘗不然况方春之始乎毋變天之道毋絶地之理毋亂人之紀日月東西相從不已風霆流形庶物露生是天道之顯者變之可乎載華嶽而不重振河海而不泄是地理之顯者絶之可乎五常設教之倫五事敬用之範是人紀之顯者亂之可乎月令載此於孟春亦春秋正王道之端之意其示戒深矣孟春行夏令則雨水不時草木蚤落國時有恐行秋令則其民大疫猋風暴雨總至藜莠蓬蒿竝興行冬令則水潦為敗雪霜大摯首種不入行令或以為天之行令或以為君之行令天令之不時乃君令之所致其實一也行夏令則孟春之時似夏雨水乃正月節不時則非時而有也草木以長養之蚤故其落亦蚤國時有恐非常常恐也有時或然如驚雷震電之類行秋令則孟春之時似秋春氣溫秋氣涼當溫而涼則為疫秋後多風多雨徒長惡草耳行冬令則孟春之時似冬春去冬未逺冬之水潦積隂所成春尚有之所以敗物或時降霜或時降雪此皆冬之物也摯猶至也首種非止一物首種如今人言發頭布種之初也不入謂不入土蓋氣寒也

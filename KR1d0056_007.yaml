body:
  text: 月令解卷七宋張虙撰孟秋之月孟秋者斗建申之辰也漢志云申堅於申則申堅也夏正為七月日在翼七月之中三統歷云日在翼十五度元嘉歷云日在翼十度日與斗建常相合申與已合故七月斗建申則日在巳翼猶在巳也翼二十二星昏建星中旦畢中建非二十八宿由建星在斗上斗二十六度其度既寬不知何日的至斗之中故舉星也畢八星建與畢相望也其日庚辛庚辛屬秋注庚之言更也辛之言新也萬物皆肅然改更秀實新成因以為日名其帝少皥其神蓐收據經惟言其帝其神初不言祀正魏相傳言西方之神少皥乘兊執矩司秋也元氣廣大謂之皥春為大皥秋為少皥蓐收者秋時物摧辱而收斂其蟲毛毛亦謂之蟲所謂毛蟲三百六十麟為之長注象物應凉氣而備寒狐貉之屬生旃毛也其音商疏謂秋時調和樂以商為主商之為言章也物成熟可章度也律中夷則夷則者月建申之律也孟秋氣至則夷則之律應周語云夷則所以詠歌九則平民無二漢志云則法也言陽氣正法度而使陰氣夷當傷之物也其數九金數四得土五數故為成數九其味辛其臭腥金曰從革而從革作辛凡辛腥者皆屬金其祀門祭先肝春祀戶秋祀門竒曰戶偶曰門戶祀其出塞向墐戶至春而出也門祀其入寶藏告成至秋而入藏也故祀其神祭用牲之藏當以人六脈之次第求之自右手起以命脈為主於是為脾為肺乃入左手為心為肝故秋先肝也凉風至白露降寒蟬鳴鷹乃祭鳥始用行戮此記七月時候也凉未至於寒故秋為凉風若北風其凉則寒矣露四時皆有之惟白露則氣肅白露為霜是也蟬至秋則無聲非寒蟬何以能鳴秋鷹祭鳥與獺祭魚豺祭獸小異雖均是示有先之意惟鷹祭時鳥猶生也祭後始殺之故云始用行戮今鷹夜擒小鳥以溫爪曉則縱之則鷹誠有不直殺之理天子居總章左個乘戎路駕白駱載白旗衣白衣服白玉秋曰白藏不言白而言章赤白為章則白在章之中矣四時惟秋繼夏為尅我者尅我成章則曰赤曰白不相離故以總章名秋所居此當申上七月之位也秋所乘路色宜尚白今曰戎路者蓋以兵車言之如詩之元戎小戎也詩之兵車有飾而此秋所乘路為戎路疏謂如周革路而飾之以白周革路鞔之以革而漆之無他飾白駱白馬黑鬛曰駱白旗旗色尚白也載謂建之於車周禮交龍為旗旗必有鈴白衣衣色尚白也白玉玉色尚白相玉經云白如截肪食麻與犬其器廉以深麻木榖也金王之時食麻恐其或過取物之泄我者以殺之犬金畜也金王之時食犬恐其或悖取物之同類者以和之秋主刻制器廉以深廉稜也以對春觀疏則圓廣廉則方嚴矣逹則顯深則隱是月也以立秋先立秋三日大史謁之天子曰某日立秋盛德在金天子乃齊立秋之日天子親帥三公九卿諸侯大夫以迎秋於西郊立秋為七月節迎秋於西郊者人君後天而奉天時當其氣至則出郊以迎所以導之也秋之盛德在金金屬秋也凡見於萬物之斂金之德也親帥羣臣迎之於西郊所以重其至示敬也迎迎其氣耳非有神也或謂即少皥蓐收故迎而祭之注引文耀鈎謂白招拒還反賞軍帥武人於朝夫與公卿大夫諸侯迎春既反則賞公卿大夫諸侯於朝與公卿大夫迎秋既反則移其賞公卿大夫諸侯者以賞軍帥武人雖各因其類亦見古人不専於文德以奪武功也天子乃命將帥選士厲兵簡練桀俊専任有功以征不義詰誅暴慢以明好惡順彼逺方迎秋之後先命將帥士必選欲其精也兵必厲欲其鋭也人有桀俊之才必簡練之以發其才有功之人蓋見之已試者以征不義收功必易人謂使功不如使過非也詰問其罪也誅責其罪也人人知暴慢者有罪則知上之好惡矣故逺方無不順服是月也命有司修法制繕囹圄具桎梏禁止姦慎罪邪務摶執命理瞻傷察創視折審斷决獄訟必端平戮有罪嚴斷刑天地始肅不可以贏迎秋之後又命有司欲其修明法制仲春省囹圄去桎梏至秋則繕囹圄具桎梏非有異也春主生秋主殺秋既主殺則姦邪可藉此搏執也若命理則又精矣傷欲其瞻創欲其察折欲其視斷决囚欲如片言折獄然不可以不審曰獄曰訟以端平為尚端之為言正也端則無偏無詖若輕重其心則非端矣平則無反無側若上下其手則非平矣有罪之人於是可戮嚴為斷刑順天地肅殺之氣也贏有餘也秋之為言揫也揫斂也肅則揫斂非有餘矣皆順天也此章反覆用刑之道謂秋主肅殺天之道不可以不順然天之道好生聖人之道將以教民非以虐民又未嘗不寓其惻隱之仁也端之為義何如門曰端門正其居也月曰端月正其始也為治不在多言在循乎正而已所由必正道適堯舜文武為正道也所用必正人選侍御僕從亦正人也則端之義廣矣平之為義何如書言迓衡平如衡也詩言如砥平如砥也治致太平豈有他術此心之平則溥博無私斯民無不被其澤一視同仁天下皆在我覆幬之中則平之義廣矣是月也農乃登穀天子嘗新先薦寢廟元日祈穀雩祈穀務農重穀也穀之種類多曰五穀曰九穀凡人資以養者皆穀也若仲秋所登之穀天子以新而嘗則嘉種之尤嘉者可為百穀之長故惟以穀名之登麥登黍時之所嘗皆新也而惟於穀獨言新者以此種熟時始可言新穀之升也以彘嘗麥以雞嘗黍凡所嘗皆有配也而嘗穀無之者見穀之為寶非他物所能配也至於寢廟之薦其事亦異魚如鮪必薦果如含桃必薦意非不誠也嘗穀嘗黍無不先薦禮非不嚴至於嘗新而薦則事殁如事生事亡如事存一飲食不敢先嘗此天子之孝也亦天下人心所同也命百官始收斂完隄防謹壅塞以備水潦修宫室壞垣墻補城郭經言收斂非止為時物也向之疏逹者今廉以深矣向之開通者今修以補矣事事物物皆以應揫斂之義曰隄防曰壅塞或全或謹此為水潦之備而已若宫室則當修垣墻則當壞城郭則當補此又治國之常經不可緩者治國猶治家也藩籬衰敗則盜得以生心棟宇傾敧則人得以肆侮國體所繫非止於禦災捍患而已也是月也毋以封諸侯立大官毋以割地行大使出大幣此節若與祭統言於嘗出田邑發秋政不合然亦不悖也封諸侯謂始建國封之者割地謂有功而加地者諸侯始封則當立卿立大夫皆大官也割地則當遣使賜幣此大使大幣蓋其鋪張揚厲以表時之盛顯設藩飾以為國之光殊失收斂之意所以戒之勿使為也孟秋行冬令則陰氣大勝介蟲敗穀戎兵乃來行春令則其國乃旱陽氣復還五穀無實行夏令則國多火災寒熱不節民多瘧疾行冬令則孟秋之時似冬當陰生之時而重陰固勝矣穀熟有年而介蟲敗之為灾非小戎兵之來亦陰類也行春令則孟秋之時似春其國乃旱秋無苦雨可也旱則不可也秋而苦旱是陽已往而復還陽氣復還宜萬物之所喜而反不能成實則出之非時非徒無益已行夏令則孟秋之時似夏陽愈盛矣陽盛則為火周禮秋時有瘧寒疾矧又行夏令乎

body:
  text: 月令解卷十一宋張虙撰仲冬之月仲冬者斗建子之辰也漢志云孳萌於子則子孳也夏正為十一月日在斗十一月之中三統歷云日在斗初度元嘉歷云日在斗十四度日與斗建常相合子與丑合故十一月斗建子則日在斗斗屬丑也南斗六星冬至之日日在斗此歷家所占以定四時也漢志以仲冬之初在斗十二度後世歲差之法以為七十五年差一度若爾則日之在斗積久而差殆將入箕矣或謂黃道歲差常不過推蕩於星紀三十度之間故邵雍立差法惟於日月交會之際以陰陽虧盈求之遂不差大抵陰常虧陽常盈只於此處差了歷上當通理程頥以此法冠絶古今案歲差者以恆星考日躔而覺其差冬至日躔所起仍復其故處於黃道本無差數而恆星則移而東故唐虞時冬至日在虛周末在斗今在箕初矣此求之陰陽虧盈以斷天行非也昏東辟中旦軫中辟六星北方之宿軫四星南方之宿辟與軫相望也其日壬癸其帝顓頊其神玄冥其蟲介其音羽律中黃鍾其數六其味鹹其臭朽其祀行祭先腎黃鍾者月建子之律也仲冬氣至則黃鍾之律應周語云黃鍾所以宣養六氣九德漢志云黃者中之色君之服也鍾者種也陽氣施種於黃泉孳萌萬物為六氣元也冰益壯地始坼鶡旦不鳴虎始交此紀十一月時候也冰益壯則水之冰者愈壯其寒氣增於地上矣地始坼則地之凍者以陽微升而坼其暖氣生於地下矣鶡旦求旦之鳥至是不鳴與虎之交皆以陽生也天子居玄堂太廟乘玄路駕鐵驪載玄旗衣黑衣服玄玉食黍與彘其器閎以奄此當子上十一月位也飭死事孟冬嘗賞死事矣至仲冬又飭之皆所以順天時也人為國事而死先王之所不忍故從而賞之然國之為國不免用人於死地所以飭之欲其有死志也此所以人忘其死也命有司曰土事毋作愼毋發蓋毋發室屋及起大衆以固而閉地氣沮泄是謂發天地之房諸蟄則死民必疾疫又隨以喪命之曰暢月觀此一節聖人奉若天時知閉塞而成冬故凡發撤掩蓋等事一一禁之以固而閉言固而且閉惟恐沮泄地氣有以發天地之房也蟄則死矣民必疾疫疫而繼以喪民亦死矣然聖人之心謂在天有時不可以不順而一氣潛萌於無形又不可不審也夫當黃鍾動而萬物潛起則天地之房固自隱然萌動其氣未嘗不暢非閉塞所可遏於是命之以名其名謂何曰暢月言其氣之舒暢也他月未嘗特立一名也此見天地之氣於閉塞之中而有調逹之理於謹固之中而有發生之意命之以名豈苟云乎哉是月也命奄尹申宮令審門閭謹房室必重閉省婦事毋得淫雖有貴戚近習毋有不禁乃命大酋秫稻必齊麴糱必時湛熾必潔水泉必香陶器必良火齊必得兼用六物大酋監之毋有差貸酒之用非一曰公酒曰禮酒曰秩酒以供祭祀以供賓客以共王反后之飲周禮設官掌之今曰大酋其酒正歟其酒人歟六物之數即周禮所謂酒材也一物不具非式法也必有差貸之患然六物皆具而不得其時則所作未必善當冬而造則時之所宜酒宜寒故作於冬欲其溫故作之於陽生之月夫一酒之用古人致嚴如此固欲其旨也而大禹反惡之何耶惟天下之美物足以溺人禹之兢兢正恐為其所溺也然則大酋之所作固當遵月令所命而致嚴大酋之所共又當知大禹所惡而致懼也天子命有司祈祀四海大川名源淵澤井泉此皆謂水神也水之功在天地間大矣聚而為海逹而為川發而為源瀦而為淵澤鑿而為井泉順盛德之時而祭之所以答其利也是月也農有不收藏積聚者馬牛畜獸有放佚者取之不詰山林藪澤有能取蔬食田獵禽獸者野虞教道之其有相侵奪者罪之不赦此章之意惟欲民知所愛務自收斂以為冬備其有積聚之不收藏馬牛畜獸之放佚此遊惰之民也不幸為人所取上未嘗詰之惡有遊惰也其有能取蔬食田獵禽獸於山林藪澤者此勤力之民也野虞於此又教而道之喜其勤力也或有侵盜之者罪之不赦彼遊惰之民為人所取上未嘗加問此勤力之民為人侵奪上為之罪其人或置而不詰或罪之而不赦上之人所以示民好惡者如此是月也日短至陰陽爭諸生蕩君子齊戒處必掩身身欲寧去聲色禁耆欲安形性事欲靜以待陰陽之所定此章與仲夏對文夏日長至冬日短至至之言極也夏言死生分冬惟言諸生蕩言生而不言死蓋自生而死如草木昆蟲之類有生於春夏而死於秋冬者顯然可見故言死生分自死而生則起於萌蘖之微初無可見之迹故惟言諸生蕩蕩謂物動將萌芽也夏則戒以毋躁冬以身欲寧繼之皆欲其靜也至於聲色不徒止之而直欲去之耆欲不徒節之而直欲禁之外則養其形而毋勞內則養其性而毋悖凡事一歸於靜又重於日長至之時也凡此以微陽方生陰未退聽爭而未定故待之也月令一篇聖人所以順陰陽之序相天地之宜上焉為國家計下焉為民生計至纖至悉無遺恨矣惟未見其所以修身養心之要蓋至於二至之時見極其齊戒之誠聲色不邇耆欲不萌一遵其至靜而無所為然後知聖人修身養心之要誠不苟也藝始生荔挺出蚯蚓結麋角解水泉動又記時候也以物紀候月令皆然惟仲冬則以微陽生於地下凡物之生於地下者尤驗注以藝為香草以荔挺為馬薤方慤引王氏以荔挺亦為香草蓋楚辭有薜荔亦香草緣木而生也蚯矧在穴氣動則交也孟冬水始冰至仲冬而冰益壯陰氣凝涸也微陽既生則凝涸者動矣日短至則伐木取竹箭木大竹小大者言伐小者取之而己箭又竹之小者是月也可以罷官之無事去器之無用者塗闕廷門閭築囹圄此所以助天地之閉藏也案今本脫所字據宋本輔罷無用之官去無用之器有塗者有築者無非收斂固護不使汗漫之意月令自入秋來凡所動作施為無非示收斂之義至冬又從而閉藏矣今於仲月之末反覆之總括之無他以一陽既生物皆嚮榮氣不可少泄正雷在地中復后以至日閉關商旅不行之時惟持養之深則其鋭無挫保護之堅則其鋒不折助天地之閉藏乃所以助天地之發逹也仲冬行夏令則其國乃旱氛霧冥冥雷乃發聲行秋令則天時雨汁瓜瓠不成國有大兵行春令則蝗蟲為敗水泉咸竭民多疥癘行夏令則仲冬之時似夏患旱與仲秋同氛霧則旱氣使然雷聲遂先期而發行秋令則仲冬之時似秋雨汁者水雪雜下以雪雜水如物之有汁謂之雨汁瓜瓠至秋而堅至冬而成今或不成則民無濟涉之具孟月行秋令則有小兵仲月行秋令則有大兵皆金氣勝也行春令則仲冬之時似春蝗蟲之災與孟夏同水泉之竭陰氣弱也疥癘虛陽作之也
